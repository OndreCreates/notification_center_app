name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Fixní porty (3307/5672) odpovídají tomu, co appka čeká hardcoded
    # v application.yml (stejná konfigurace jako lokální docker-compose).
    # Testcontainers integrační test si spouští vlastní kontejnery na
    # náhodných portech přes Docker daemon runneru, s tímhle nekoliduje.
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: notification_center
          MYSQL_USER: notification_center
          MYSQL_PASSWORD: notification_center
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw -B test
